<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Judovisa</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#osaekomi">Osaekomi</a></li>
                <li><a href="#shimewaza">Shimewaza</a></li>
                <li><a href="#kansetsuwaza">Kansetsuwaza</a></li>
                <li><a href="#tewaza">Tewaza</a></li>
                <li><a href="#koshiwaza">Koshiwaza</a></li>
                <li><a href="#ashiwaza">Ashiwaza</a></li>
                <li><a href="#Sutemiwaza">Sutemiwaza</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Judovisa</h1>
        <section id="osaekomi">
            <div class="kysymys">
                <p>Kerro kesagatame-luokan sidonnat. Vihje: niitä on neljä.</p>
                <input type="text" id="vastausKesagatame" autocomplete="off">
                <button id="nappiKesagatame">Tarkista</button>
                <ul id="palauteKesagatame"></ul>
            </div>
        </section>

        <section id="koshiwaza">
            <div class="kysymys">
                <p>Kerro kuusi koshiwaza luokan heittoa</p>
                <input type="text" id="vastausKoshiwaza" autocomplete="off">
                <button id="nappiKoshiwaza">Tarkista</button>
                <ul id="palauteKoshiwaza"></ul>
            </div>
        </section>

        <section>
            <div class="loppupisteet">
                <p id="yhteispisteet">Yhteispisteesi</p>
            </div>
        </section>
        
    </main>
    <footer>
    </footer>

    <!-- Scripti hoitaa nyt kaikki napit ja Enter-toiminnot -->
    <script src="script.js"></script>
</body>
</html>
